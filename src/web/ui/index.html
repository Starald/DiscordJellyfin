<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JellyfinDS</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <!-- Экран логина -->
    <div id="login" class="login hidden">
      <form id="loginForm" class="login-card">
        <div class="login-title">JellyfinDS</div>
        <input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password" />
        <button type="submit">Войти</button>
        <div id="loginError" class="login-error hidden"></div>
      </form>
    </div>

    <!-- Панель -->
    <div id="app" class="hidden">
      <header>
        <div class="brand">
          JellyfinDS <span class="mode-badge">бот</span>
        </div>
        <div class="head-right">
          <span id="status" class="status">…</span>
          <button id="browserModeBtn" class="icon" title="Открыть проигрывание прямо в браузере, без Discord">Плеер</button>
          <button id="jellyfinLink" class="icon" title="Перейти на Jellyfin">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <defs>
                <path d="M190.56 329.07c8.63 17.3 122.4 17.12 130.93 0 8.52-17.1-47.9-119.78-65.46-119.8-17.57 0-74.1 102.5-65.47 119.8z" id="A"/>
                <linearGradient id="B" gradientUnits="userSpaceOnUse" x1="126.15" y1="219.32" x2="457.68" y2="410.73">
                  <stop offset="0%" stop-color="#aa5cc3"/>
                  <stop offset="100%" stop-color="#00a4dc"/>
                </linearGradient>
                <path d="M58.75 417.03c25.97 52.15 368.86 51.55 394.55 0S308.93 56.08 256.03 56.08c-52.92 0-223.25 308.8-197.28 360.95zm68.04-45.25c-17.02-34.17 94.6-236.5 129.26-236.5 34.67 0 146.1 202.7 129.26 236.5-16.83 33.8-241.5 34.17-258.52 0z" id="C"/>
              </defs>
              <use href="#A" fill="url(#B)"/>
              <use href="#C" fill="url(#B)"/>
            </svg>
          </button>
          <button id="historyBtn" class="icon" title="История прослушиваний">
            <span class="material-icons">history</span>
          </button>
          <button id="adminBtn" class="icon" title="Настройки (сертификат, логи)">
            <span class="material-icons">settings</span>
          </button>
          <button id="logout" class="icon" title="Выйти">
            <span class="material-icons">logout</span>
          </button>
        </div>
      </header>

      <main>
        <section class="left">
          <div class="row channel-row">
            <label for="channel">Канал</label>
            <select id="channel"></select>
            <button id="refreshChannels" class="icon" title="Обновить список каналов">⟳</button>
          </div>

          <div class="tabs">
            <button class="tab active" data-tab="jellyfin">Jellyfin</button>
            <button class="tab" data-tab="youtube">YouTube</button>
            <button class="tab" data-tab="yandex">Яндекс</button>
            <button class="tab" data-tab="vk">VK</button>
          </div>

          <div id="tabJellyfin" class="tabpane">
            <div class="row">
              <select id="type">
                <option value="track">Трек</option>
                <option value="album">Альбом</option>
                <option value="playlist">Плейлист</option>
                <option value="artist">Исполнитель</option>
              </select>
              <input id="search" type="text" placeholder="Поиск" autocomplete="off" />
              <button id="randomBtn" class="random" title="Случайный трек в очередь">Рандом</button>
            </div>
            <ul id="results" class="results"></ul>
          </div>

          <div id="tabYoutube" class="tabpane hidden">
            <div class="row">
              <input id="ytSearch" type="text" placeholder="Поиск" autocomplete="off" />
              <button id="ytGo" class="random">Найти</button>
            </div>
            <ul id="ytResults" class="results"></ul>
          </div>

          <div id="tabYandex" class="tabpane hidden">
            <div class="row">
              <select id="yaType">
                <option value="track">Трек</option>
                <option value="album">Альбом</option>
                <option value="artist">Исполнитель</option>
                <option value="playlist">Плейлист</option>
              </select>
              <input id="yaSearch" type="text" placeholder="Поиск" autocomplete="off" />
              <button id="yaGo" class="random">Найти</button>
            </div>
            <ul id="yaResults" class="results"></ul>
          </div>

          <div id="tabVk" class="tabpane hidden">
            <div class="row">
              <select id="vkType">
                <option value="track">Трек</option>
                <option value="playlist">Плейлист</option>
              </select>
              <input id="vkSearch" type="text" placeholder="Поиск" autocomplete="off" />
              <button id="vkGo" class="random">Найти</button>
            </div>
            <ul id="vkResults" class="results"></ul>
          </div>
        </section>

        <section class="right">
          <div id="nowplaying" class="nowplaying">
            <div class="np-empty">Ничего не играет</div>
          </div>
          <div class="controls">
            <button id="pause" title="Пауза / продолжить">
              <span class="material-icons">play_arrow</span>
            </button>
            <button id="skip" title="Следующий">
              <span class="material-icons">skip_next</span>
            </button>
            <button id="shuffle" title="Перемешать">
              <span class="material-icons">shuffle</span>
            </button>
            <button id="stop" title="Стоп и очистить">
              <span class="material-icons">stop</span>
            </button>
            <button id="leave" title="Покинуть канал">
              <span class="material-icons">logout</span>
            </button>
          </div>
          <h3>Очередь</h3>
          <ul id="queue" class="queue"></ul>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <!-- Диалог администрирования -->
    <div id="adminModal" class="modal hidden">
      <div class="modal-card admin-card">
        <div class="modal-head">
          <span class="modal-title">Администрирование</span>
          <button id="adminClose" class="icon" title="Закрыть">✕</button>
        </div>
        <div id="adminBody" class="admin-body"></div>
      </div>
    </div>

    <!-- Диалог истории прослушиваний -->
    <div id="historyModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <span class="modal-title">История прослушиваний</span>
          <button id="historyClose" class="icon" title="Закрыть">✕</button>
        </div>
        <ul id="historyList" class="results"></ul>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
