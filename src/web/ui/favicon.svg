<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">
  <defs>
    <linearGradient id="jd-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa5cc3" /> <!-- Jellyfin Purple -->
      <stop offset="50%" stop-color="#5865f2" /> <!-- Discord Blurple -->
      <stop offset="100%" stop-color="#00a4dc" /> <!-- Jellyfin Cyan -->
    </linearGradient>
  </defs>
  
  <!-- Темный фон (цвета из твоей панели) -->
  <rect width="120" height="120" rx="28" fill="#171a21" />
  <rect width="116" height="116" x="2" y="2" rx="26" fill="none" stroke="#2a2f3a" stroke-width="2" />

  <!-- Эквалайзер в форме кнопки Play -->
  <rect x="35" y="30" width="12" height="60" rx="6" fill="url(#jd-grad)" />
  <rect x="53" y="42" width="12" height="36" rx="6" fill="url(#jd-grad)" />
  <rect x="71" y="54" width="12" height="12" rx="6" fill="url(#jd-grad)" />
</svg>
