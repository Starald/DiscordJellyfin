<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jellyfin Discord Bot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="brand">🎵 Jellyfin → Discord</div>
      <div id="status" class="status">…</div>
    </header>

    <div id="error" class="error hidden"></div>

    <main>
      <section class="left">
        <div class="row">
          <label for="channel">Канал</label>
          <select id="channel"></select>
          <button id="refreshChannels" class="icon" title="Обновить список каналов">⟳</button>
        </div>
        <div class="row">
          <select id="type">
            <option value="album">Альбом</option>
            <option value="artist">Исполнитель</option>
            <option value="playlist">Плейлист</option>
            <option value="track">Трек</option>
          </select>
          <input id="search" type="text" placeholder="Поиск по Jellyfin…" autocomplete="off" />
        </div>
        <ul id="results" class="results"></ul>
      </section>

      <section class="right">
        <div id="nowplaying" class="nowplaying">
          <div class="np-empty">Ничего не играет</div>
        </div>
        <div class="controls">
          <button id="pause" title="Пауза / продолжить">⏯</button>
          <button id="skip" title="Следующий">⏭</button>
          <button id="shuffle" title="Перемешать">🔀</button>
          <button id="stop" title="Стоп и очистить">⏹</button>
          <button id="leave" title="Выйти из канала">⏏</button>
        </div>
        <h3>Очередь</h3>
        <ul id="queue" class="queue"></ul>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
  </body>
</html>
